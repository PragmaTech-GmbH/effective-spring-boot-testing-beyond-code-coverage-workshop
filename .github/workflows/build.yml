name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: ./mvnw verify --batch-mode --no-transfer-progress -Dmaven.test.redirectTestOutputToFile=true

    - name: Display test output on failure
      if: failure()
      run: |
        find . -name "*.txt" -path "*/surefire-reports/*" -exec echo "=== {} ===" \; -exec cat {} \;
        find . -name "*.txt" -path "*/failsafe-reports/*" -exec echo "=== {} ===" \; -exec cat {} \;

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Docker
      id: setup-docker
      uses: docker/setup-docker-action@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      env:
        # docker/setup-docker-action uses a TCP socket, not the Windows named pipe.
        # Testcontainers checks the named pipe first and fails without this override.
        DOCKER_HOST: ${{ steps.setup-docker.outputs.docker-host }}
        # Tell Testcontainers where containers expose their mapped ports.
        TESTCONTAINERS_HOST_OVERRIDE: localhost
      run: .\mvnw.cmd verify --batch-mode --no-transfer-progress
