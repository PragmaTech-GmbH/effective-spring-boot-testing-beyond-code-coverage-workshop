<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1380" width="900" height="1380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="phaseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a4a7a"/>
    </linearGradient>
    <linearGradient id="testGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#6a40a0"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000040"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eff"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1380" fill="#0d1117"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="80" fill="url(#headerGrad)"/>
  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="1">JUnit 5 Extension Points</text>
  <text x="450" y="58" text-anchor="middle" fill="#94a3b8" font-size="13">Ordered by Test Lifecycle</text>

  <!-- Legend -->
  <rect x="20" y="90" width="860" height="38" rx="6" fill="#1e2433"/>
  <rect x="35" y="104" width="14" height="14" rx="3" fill="#4a9eff"/>
  <text x="56" y="115" fill="#94a3b8" font-size="11">Lifecycle Phase</text>
  <rect x="175" y="104" width="14" height="14" rx="3" fill="#4ade80"/>
  <text x="196" y="115" fill="#94a3b8" font-size="11">Extension Point</text>
  <rect x="315" y="104" width="14" height="14" rx="3" fill="#fb923c"/>
  <text x="336" y="115" fill="#94a3b8" font-size="11">Conditional / Special</text>
  <rect x="480" y="104" width="14" height="14" rx="3" fill="#a78bfa"/>
  <text x="501" y="115" fill="#94a3b8" font-size="11">InvocationInterceptor</text>
  <rect x="645" y="104" width="14" height="14" rx="3" fill="#f87171"/>
  <text x="666" y="115" fill="#94a3b8" font-size="11">Exception / Observation</text>

  <!-- ─── CENTER SPINE ─── -->
  <line x1="450" y1="136" x2="450" y2="1340" stroke="#2d3748" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PHASE 1: CLASS LEVEL SETUP -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="310" y="140" width="280" height="44" rx="8" fill="url(#phaseGrad)" filter="url(#shadow)"/>
  <text x="450" y="157" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600" letter-spacing="1">CLASS LEVEL</text>
  <text x="450" y="175" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Test Class Setup</text>

  <!-- ExecutionCondition (class) - LEFT -->
  <rect x="30" y="148" width="230" height="34" rx="6" fill="#1c3a5e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="145" y="162" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">ExecutionCondition</text>
  <text x="145" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">Decides if class is skipped</text>
  <line x1="260" y1="162" x2="308" y2="162" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>

  <!-- Arrow down -->
  <line x1="450" y1="184" x2="450" y2="210" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PHASE 2: BeforeAllCallback -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="350" y="212" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="226" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">BeforeAllCallback</text>
  <text x="450" y="240" text-anchor="middle" fill="#94a3b8" font-size="9">.beforeAll(context)</text>

  <line x1="450" y1="246" x2="450" y2="266" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PHASE 3: @BeforeAll -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="310" y="268" width="280" height="44" rx="8" fill="url(#phaseGrad)" filter="url(#shadow)"/>
  <text x="450" y="284" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600" letter-spacing="1">ANNOTATION</text>
  <text x="450" y="303" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">@BeforeAll methods</text>

  <!-- InvocationInterceptor @BeforeAll - RIGHT -->
  <rect x="630" y="274" width="240" height="34" rx="6" fill="#2d1b5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="288" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">InvocationInterceptor</text>
  <text x="750" y="302" text-anchor="middle" fill="#94a3b8" font-size="9">.interceptBeforeAllMethod()</text>
  <line x1="592" y1="290" x2="628" y2="290" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <line x1="450" y1="312" x2="450" y2="335" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FOR EACH TEST LOOP BOX -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="18" y="338" width="864" height="840" rx="10" fill="none" stroke="#2d3748" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="32" y="358" fill="#4a5568" font-size="10" font-weight="600" letter-spacing="1">FOR EACH TEST METHOD</text>

  <!-- ─── ExecutionCondition (method) ─── -->
  <rect x="350" y="365" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="450" y="379" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">ExecutionCondition</text>
  <text x="450" y="393" text-anchor="middle" fill="#94a3b8" font-size="9">Decides if test is skipped</text>

  <line x1="450" y1="399" x2="450" y2="422" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── TestInstanceFactory ─── -->
  <rect x="40" y="425" width="215" height="34" rx="6" fill="#1c3a5e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="148" y="439" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">TestInstanceFactory</text>
  <text x="148" y="453" text-anchor="middle" fill="#94a3b8" font-size="9">Creates the test instance</text>
  <line x1="255" y1="442" x2="308" y2="442" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>

  <rect x="310" y="425" width="280" height="44" rx="8" fill="url(#phaseGrad)" filter="url(#shadow)"/>
  <text x="450" y="441" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600" letter-spacing="1">INSTANTIATION</text>
  <text x="450" y="460" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Test Instance Created</text>

  <line x1="450" y1="469" x2="450" y2="492" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── TestInstancePostProcessor ─── -->
  <rect x="350" y="494" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="508" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">TestInstancePostProcessor</text>
  <text x="450" y="522" text-anchor="middle" fill="#94a3b8" font-size="9">.postProcessTestInstance()</text>

  <line x1="450" y1="528" x2="450" y2="548" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── BeforeEachCallback ─── -->
  <rect x="350" y="550" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="564" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">BeforeEachCallback</text>
  <text x="450" y="578" text-anchor="middle" fill="#94a3b8" font-size="9">.beforeEach(context)</text>

  <line x1="450" y1="584" x2="450" y2="604" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── @BeforeEach ─── -->
  <rect x="310" y="606" width="280" height="44" rx="8" fill="url(#phaseGrad)" filter="url(#shadow)"/>
  <text x="450" y="622" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600" letter-spacing="1">ANNOTATION</text>
  <text x="450" y="641" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">@BeforeEach methods</text>

  <!-- InvocationInterceptor @BeforeEach - RIGHT -->
  <rect x="630" y="612" width="240" height="34" rx="6" fill="#2d1b5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="626" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">InvocationInterceptor</text>
  <text x="750" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">.interceptBeforeEachMethod()</text>
  <line x1="592" y1="628" x2="628" y2="628" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <line x1="450" y1="650" x2="450" y2="670" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── ParameterResolver ─── -->
  <rect x="40" y="672" width="215" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="148" y="686" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">ParameterResolver</text>
  <text x="148" y="700" text-anchor="middle" fill="#94a3b8" font-size="9">Injects method parameters</text>
  <line x1="255" y1="689" x2="308" y2="689" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrowhead-green)"/>

  <!-- ─── BeforeTestExecutionCallback ─── -->
  <rect x="350" y="672" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="686" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">BeforeTestExecution</text>
  <text x="450" y="700" text-anchor="middle" fill="#94a3b8" font-size="9">Callback .beforeTestExecution()</text>

  <line x1="450" y1="706" x2="450" y2="726" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── TEST METHOD (main) ─── -->
  <rect x="295" y="728" width="310" height="56" rx="10" fill="url(#testGrad)" filter="url(#shadow)"/>
  <text x="450" y="748" text-anchor="middle" fill="#e9d5ff" font-size="10" font-weight="600" letter-spacing="1">TEST EXECUTION</text>
  <text x="450" y="768" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="800">@Test Method</text>

  <!-- InvocationInterceptor @Test - RIGHT -->
  <rect x="630" y="736" width="240" height="34" rx="6" fill="#2d1b5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="750" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">InvocationInterceptor</text>
  <text x="750" y="764" text-anchor="middle" fill="#94a3b8" font-size="9">.interceptTestMethod()</text>
  <line x1="607" y1="753" x2="628" y2="753" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- TestTemplateInvocationContextProvider - LEFT -->
  <rect x="40" y="730" width="215" height="48" rx="6" fill="#1c3a5e" stroke="#fb923c" stroke-width="1.5"/>
  <text x="148" y="746" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">TestTemplateInvocation</text>
  <text x="148" y="760" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">ContextProvider</text>
  <text x="148" y="773" text-anchor="middle" fill="#94a3b8" font-size="9">For @TestTemplate / @ParameterizedTest</text>
  <line x1="255" y1="754" x2="293" y2="754" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>

  <line x1="450" y1="784" x2="450" y2="806" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── TestExecutionExceptionHandler ─── -->
  <rect x="350" y="808" width="200" height="34" rx="6" fill="#3b1c1c" stroke="#f87171" stroke-width="1.5"/>
  <text x="450" y="822" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">TestExecutionException</text>
  <text x="450" y="836" text-anchor="middle" fill="#94a3b8" font-size="9">Handler — catches test exceptions</text>

  <line x1="450" y1="842" x2="450" y2="862" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── AfterTestExecutionCallback ─── -->
  <rect x="350" y="864" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="878" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">AfterTestExecution</text>
  <text x="450" y="892" text-anchor="middle" fill="#94a3b8" font-size="9">Callback .afterTestExecution()</text>

  <line x1="450" y1="898" x2="450" y2="918" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── @AfterEach ─── -->
  <rect x="310" y="920" width="280" height="44" rx="8" fill="url(#phaseGrad)" filter="url(#shadow)"/>
  <text x="450" y="936" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600" letter-spacing="1">ANNOTATION</text>
  <text x="450" y="955" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">@AfterEach methods</text>

  <!-- InvocationInterceptor @AfterEach - RIGHT -->
  <rect x="630" y="926" width="240" height="34" rx="6" fill="#2d1b5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="940" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">InvocationInterceptor</text>
  <text x="750" y="954" text-anchor="middle" fill="#94a3b8" font-size="9">.interceptAfterEachMethod()</text>
  <line x1="592" y1="942" x2="628" y2="942" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <line x1="450" y1="964" x2="450" y2="984" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── AfterEachCallback ─── -->
  <rect x="350" y="986" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="1000" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">AfterEachCallback</text>
  <text x="450" y="1014" text-anchor="middle" fill="#94a3b8" font-size="9">.afterEach(context)</text>

  <line x1="450" y1="1020" x2="450" y2="1040" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── TestInstancePreDestroyCallback ─── -->
  <rect x="350" y="1042" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="1056" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">TestInstancePreDestroy</text>
  <text x="450" y="1070" text-anchor="middle" fill="#94a3b8" font-size="9">Callback — before GC</text>

  <line x1="450" y1="1076" x2="450" y2="1096" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── TestWatcher ─── -->
  <rect x="630" y="1058" width="240" height="58" rx="6" fill="#3b1c1c" stroke="#f87171" stroke-width="1.5"/>
  <text x="750" y="1073" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">TestWatcher</text>
  <text x="750" y="1088" text-anchor="middle" fill="#94a3b8" font-size="9">.testSuccessful() / .testFailed()</text>
  <text x="750" y="1102" text-anchor="middle" fill="#94a3b8" font-size="9">.testAborted() / .testDisabled()</text>
  <line x1="592" y1="1079" x2="628" y2="1079" stroke="#f87171" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- end of loop box -->
  <rect x="350" y="1098" width="200" height="34" rx="6" fill="#1a2433" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="1118" text-anchor="middle" fill="#4a5568" font-size="11" font-style="italic">↺ next test method</text>

  <!-- ─────────────────────────── -->
  <!-- AFTER LOOP -->
  <!-- ─────────────────────────── -->
  <line x1="450" y1="1178" x2="450" y2="1198" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── @AfterAll ─── -->
  <rect x="310" y="1200" width="280" height="44" rx="8" fill="url(#phaseGrad)" filter="url(#shadow)"/>
  <text x="450" y="1216" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600" letter-spacing="1">ANNOTATION</text>
  <text x="450" y="1235" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">@AfterAll methods</text>

  <!-- InvocationInterceptor @AfterAll - RIGHT -->
  <rect x="630" y="1206" width="240" height="34" rx="6" fill="#2d1b5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="1220" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">InvocationInterceptor</text>
  <text x="750" y="1234" text-anchor="middle" fill="#94a3b8" font-size="9">.interceptAfterAllMethod()</text>
  <line x1="592" y1="1222" x2="628" y2="1222" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <line x1="450" y1="1244" x2="450" y2="1264" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ─── AfterAllCallback ─── -->
  <rect x="350" y="1266" width="200" height="34" rx="6" fill="#1c3a5e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="1280" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">AfterAllCallback</text>
  <text x="450" y="1294" text-anchor="middle" fill="#94a3b8" font-size="9">.afterAll(context)</text>

  <!-- ─── END ─── -->
  <rect x="380" y="1320" width="140" height="30" rx="15" fill="#1a2433" stroke="#4a5568" stroke-width="1.5"/>
  <text x="450" y="1340" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600">Test Suite Done</text>
  <line x1="450" y1="1300" x2="450" y2="1318" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- note: loop bracket repeat arrow -->
  <path d="M 882 1132 Q 895 1132 895 1100 Q 895 390 882 390" stroke="#2d3748" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>

</svg>
