services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookshelf
      POSTGRES_USER: bookshelf
      POSTGRES_PASSWORD: bookshelf
    ports:
      - '5432:5432'
  mailpit:
    image: axllent/mailpit:v1.20
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - '1025:1025'
      - '8025:8025'
